name: WhatsApp Checker Bot

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours (optional, bisa dihapus)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Cache Node modules
      uses: actions/cache@v3
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
    
    - name: Cache Python packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install Node dependencies
      run: npm install
    
    - name: Install Python dependencies
      run: pip install -r requirements.txt
    
    - name: Restore WhatsApp session
      uses: actions/cache@v3
      with:
        path: auth_info_baileys
        key: wa-session-${{ github.run_id }}
        restore-keys: |
          wa-session-
    
    - name: Run bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        # Check if auth exists
        if [ ! -d "auth_info_baileys" ]; then
          echo "⚠️ No WhatsApp session found!"
          echo "You need to scan QR code first."
          echo "Run this locally once to generate session, then commit auth_info_baileys/"
          exit 1
        fi
        
        # Run bot with timeout (GitHub Actions max 6 hours)
        timeout 21600 python3 telegram_bot.py || echo "Bot stopped (timeout or error)"
    
    - name: Save WhatsApp session
      if: always()
      uses: actions/cache/save@v3
      with:
        path: auth_info_baileys
        key: wa-session-${{ github.run_id }}
